version: '3.8'

services:
  influxdb:
    image: influxdb:2.7-alpine
    container_name: mingtang-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=architecture_research
      - DOCKER_INFLUXDB_INIT_BUCKET=mingtang_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=mingtang-secret-token
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mingtang-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: mingtang-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto-config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

  dtu_receiver:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dtu_receiver
    container_name: mingtang-dtu-receiver
    ports:
      - "8001:8001"
    environment:
      - APP_ENV=production
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=mingtang-secret-token
      - INFLUXDB_ORG=architecture_research
      - INFLUXDB_BUCKET=mingtang_data
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - influxdb
      - redis
    restart: unless-stopped

  daylight_simulator:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.daylight_simulator
    container_name: mingtang-daylight-simulator
    ports:
      - "8002:8002"
    environment:
      - APP_ENV=production
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=mingtang-secret-token
      - INFLUXDB_ORG=architecture_research
      - INFLUXDB_BUCKET=mingtang_data
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LATITUDE=34.2658
      - LONGITUDE=108.9541
    depends_on:
      - influxdb
      - redis
    restart: unless-stopped

  sunlight_optimizer:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.sunlight_optimizer
    container_name: mingtang-sunlight-optimizer
    ports:
      - "8003:8003"
    environment:
      - APP_ENV=production
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=mingtang-secret-token
      - INFLUXDB_ORG=architecture_research
      - INFLUXDB_BUCKET=mingtang_data
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LATITUDE=34.2658
      - LONGITUDE=108.9541
    depends_on:
      - influxdb
      - redis
    restart: unless-stopped

  alarm_mqtt:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.alarm_mqtt
    container_name: mingtang-alarm-mqtt
    ports:
      - "8004:8004"
    environment:
      - APP_ENV=production
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=mingtang-secret-token
      - INFLUXDB_ORG=architecture_research
      - INFLUXDB_BUCKET=mingtang_data
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=mingtang/alerts
      - LATITUDE=34.2658
      - LONGITUDE=108.9541
    depends_on:
      - influxdb
      - redis
      - mosquitto
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mingtang-frontend
    ports:
      - "3000:80"
    depends_on:
      - dtu_receiver
      - daylight_simulator
      - sunlight_optimizer
      - alarm_mqtt
    restart: unless-stopped

volumes:
  influxdb-data:
  redis-data:
  mosquitto-config:
  mosquitto-data:
  mosquitto-log:
