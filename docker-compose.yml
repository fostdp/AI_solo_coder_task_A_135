version: '3.8'

services:
  influxdb:
    image: influxdb:2.7-alpine
    container_name: mingtang-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=architecture_research
      - DOCKER_INFLUXDB_INIT_BUCKET=mingtang_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=mingtang-secret-token
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: mingtang-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto-config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mingtang-backend
    ports:
      - "8000:8000"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=mingtang-secret-token
      - INFLUXDB_ORG=architecture_research
      - INFLUXDB_BUCKET=mingtang_data
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USERNAME=admin
      - MQTT_PASSWORD=password
      - MQTT_TOPIC=mingtang/alerts
    depends_on:
      - influxdb
      - mosquitto
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mingtang-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  influxdb-data:
  mosquitto-config:
  mosquitto-data:
  mosquitto-log:
